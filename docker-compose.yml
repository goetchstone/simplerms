# docker-compose.yml

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: simplerms
      POSTGRES_PASSWORD: simplerms_dev
      POSTGRES_DB: simplerms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplerms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://simplerms:simplerms_dev@db:5432/simplerms
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # One-shot container for migrations and seeds — has full node_modules
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://simplerms:simplerms_dev@db:5432/simplerms
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  uploads_data:
