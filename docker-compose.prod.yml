# docker-compose.prod.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    build:
      target: production
    environment:
      NODE_ENV: production
    restart: always
    # Strip the dev bind-mounts so the built image files aren't overwritten.
    volumes:
      - uploads_data:/app/uploads

  db:
    restart: always
    ports: []
