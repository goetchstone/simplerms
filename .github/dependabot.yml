# .github/dependabot.yml
# Catches CVEs in dependencies. Free, low-noise when grouped.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      prod-deps:
        dependency-type: production
        # Pin nodemailer to its current major while next-auth's peer-dep catches up.
        # Re-evaluate when next-auth 5 stable lists nodemailer@^8 as supported.
        exclude-patterns:
          - "nodemailer"
      dev-deps:
        dependency-type: development
    ignore:
      - dependency-name: "nodemailer"
        update-types: ["version-update:semver-major"]
      # Prisma 7 moves datasource URL out of schema.prisma into prisma.config.ts.
      # Migration is non-trivial; pin until we explicitly do it.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
