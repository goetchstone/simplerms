# .github/workflows/semgrep.yml
# Semgrep — pattern-based SAST. Free community ruleset.
# Complementary to CodeQL: catches framework misuse, OWASP patterns, dangerous APIs.
name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 9 * * 1"  # Mondays 09:30 UTC

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/javascript \
            --config p/typescript \
            --config p/nextjs \
            --config p/react \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif \
            --output=semgrep.sarif
        env:
          # No SEMGREP_APP_TOKEN — runs on free community rulesets only.
          # Findings appear in Security tab via SARIF upload below.
          SEMGREP_RULES: >-
            p/javascript
            p/typescript
            p/nextjs
            p/react
            p/owasp-top-ten
            p/secrets

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
