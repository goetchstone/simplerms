# .github/workflows/semgrep.yml
# Semgrep — pattern-based SAST on the free community ruleset.
# `semgrep ci` exits non-zero on findings (the merge gate); results also upload
# to the Security tab as SARIF. Code scanning is free again now the repo is
# public.
name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 9 * * 1"  # Mondays 09:30 UTC

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
      # upload-sarif reads the workflow run for context; without this the SARIF
      # upload 403s with "Resource not accessible by integration".
      actions: read

    steps:
      - uses: actions/checkout@v7

      - name: Run Semgrep
        run: |
          # Excluded rules are CI-config best-practices, not application security,
          # and they fail the whole-repo main scan on accepted tradeoffs (PR diff
          # scans don't hit them). Same posture as the npm-audit allowlist.
          #   - mutable-action-tag: we use `@vN` action tags, not SHA pins
          #     (Dependabot keeps them current); revisit if we adopt SHA pinning.
          #   - dependabot-missing-cooldown: no cooldown configured by choice.
          semgrep ci \
            --config p/javascript \
            --config p/typescript \
            --config p/nextjs \
            --config p/react \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude-rule yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag \
            --exclude-rule package_managers.dependabot.dependabot-missing-cooldown.dependabot-missing-cooldown \
            --sarif \
            --output=semgrep.sarif
        env:
          # No SEMGREP_APP_TOKEN — free community rulesets only.
          SEMGREP_RULES: >-
            p/javascript
            p/typescript
            p/nextjs
            p/react
            p/owasp-top-ten
            p/secrets

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
